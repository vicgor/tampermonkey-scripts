name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Полная история (не shallow depth: 1 по умолчанию) — нужна scripts/check-version-bump.js
          # для git merge-base с базовой веткой PR, которая может быть заметно старше HEAD.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Метаблок-валидатор
        run: npm run validate-meta

      - name: Проверка бампа @version
        run: npm run check-version-bump
